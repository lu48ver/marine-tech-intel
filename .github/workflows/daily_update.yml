name: Daily Update

# Runs the crawlers, rebuilds the static site, commits refreshed data back to
# main and publishes build/ to the gh-pages branch.
on:
  schedule:
    # 00:00 UTC == 08:00 Taiwan time, once per day
    - cron: "0 0 * * *"
  workflow_dispatch: {}  # allow manual "Run workflow" button

# Needed to push data/ back to main and to publish gh-pages
permissions:
  contents: write

# Avoid overlapping runs if a previous one is still going
concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        # Fail fast: broken build/crawler logic must not crawl, spend API
        # credit, or deploy a broken page.
        run: python -m pytest -q

      - name: Run crawlers
        # A total crawl failure must not block the rebuild/deploy: BaseCrawler
        # preserves the previous JSON, so the site still ships last-known data.
        continue-on-error: true
        run: python scripts/run_all_crawlers.py

      - name: Summarize new items (AI)
        # Optional: only runs if the OPENAI_API_KEY secret is set. Caching means
        # only newly-crawled items cost anything. Never blocks the deploy.
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            python scripts/summarize.py
          else
            echo "OPENAI_API_KEY not set — skipping AI summaries"
          fi

      - name: AI digest — emerging themes (選題)
        # Optional: only runs if the OPENAI_API_KEY secret is set. One LLM call
        # per run; refreshes the "AI RADAR" themes. Never blocks the deploy.
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            python scripts/digest.py
          else
            echo "OPENAI_API_KEY not set — skipping AI digest"
          fi

      - name: Build site
        run: python scripts/build_site.py

      # Deploy the site FIRST so publishing is never blocked by a push race on
      # main (data commit-back is best-effort and happens after this).
      - name: Publish to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          # .nojekyll is added automatically so /static assets are served as-is

      - name: Commit refreshed data to main
        # Best-effort: rebase onto any commits pushed since checkout, then push.
        # A failure here must not fail the run — the site is already deployed and
        # the data will be committed on the next run.
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "no data changes to commit"
            exit 0
          fi
          git commit -m "chore: daily crawl data update [skip ci]"
          for attempt in 1 2 3; do
            if git pull --rebase origin "$GITHUB_REF_NAME" \
               && git push origin "HEAD:$GITHUB_REF_NAME"; then
              echo "data pushed on attempt $attempt"
              exit 0
            fi
            echo "push attempt $attempt failed, retrying..."
            sleep 5
          done
          echo "could not push data update after retries (will retry next run)"

      - name: Archive articles to Obsidian vault (TechNews)
        # Append-only export of today's crawl into the wei_obsidian repo
        # ("marine engineer/TechNews/"), which obsidian-git then syncs to the
        # user's devices. Needs the VAULT_DEPLOY_KEY secret (deploy key with
        # write access on wei_obsidian); skipped when unset. Never blocks.
        continue-on-error: true
        env:
          VAULT_DEPLOY_KEY: ${{ secrets.VAULT_DEPLOY_KEY }}
        run: |
          if [ -z "$VAULT_DEPLOY_KEY" ]; then
            echo "VAULT_DEPLOY_KEY not set — skipping Obsidian archive"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$VAULT_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/vault_key
          chmod 600 ~/.ssh/vault_key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/vault_key -o StrictHostKeyChecking=accept-new"
          # sparse clone: only the TechNews folder, not the whole vault
          git clone --depth 1 --filter=blob:none --sparse \
            git@github.com:lu48ver/wei_obsidian.git vault
          git -C vault sparse-checkout set "marine engineer/TechNews"
          python scripts/export_obsidian.py --vault vault
          cd vault
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "marine engineer/TechNews"
          if git diff --staged --quiet; then
            echo "no new articles to archive"
            exit 0
          fi
          git commit -m "archive: TechNews daily export"
          # obsidian-git on the user's devices pushes too — rebase and retry
          for attempt in 1 2 3; do
            if git pull --rebase && git push; then
              echo "archived on attempt $attempt"
              exit 0
            fi
            sleep 5
          done
          echo "could not push archive (will retry next run)"

      # Runs LAST so a red X here never blocks the deploy above. Fails the run
      # (and triggers GitHub's failure email) if any enabled source errored,
      # and writes a per-source status table to the run summary.
      - name: Crawler health check
        run: python scripts/check_crawler_health.py
